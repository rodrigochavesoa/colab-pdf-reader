name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 0'

# Adicionamos esta variável para forçar o uso do Node 24 e remover o primeiro aviso
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  analyze:
    name: Analyze Code Security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write 

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      # Atualizamos de v3 para v4 para remover o segundo aviso
      uses: github/codeql-action/init@v4 
      with:
        languages: ${{ matrix.language }}
        config: |
          paths-ignore:
            - '**/pdf.min.js'
            - '**/pdf.worker.min.js'

    - name: Perform CodeQL Analysis
      # Atualizamos de v3 para v4 para remover o segundo aviso
      uses: github/codeql-action/analyze@v4 
      with:
        category: "/language:${{matrix.language}}"